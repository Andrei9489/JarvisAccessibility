name: Android APK Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Copy APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/app-debug.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JarvisAccessibility-debug
          path: release/app-debug.apk

      - name: Read version name
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle | head -1 | sed 's/.*versionName = "\(.*\)".*/\1/')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle | head -1 | sed 's/.*versionCode = \(.*\)/\1/')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Create versioned GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: Jarvis Accessibility v${{ steps.version.outputs.version_name }}
          body: |
            Jarvis Accessibility APK

            Version code: ${{ steps.version.outputs.version_code }}
            Version name: ${{ steps.version.outputs.version_name }}
          files: release/app-debug.apk
          make_latest: true

      - name: Publish APK to fixed latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Jarvis Accessibility APK
          body: |
            Latest Jarvis Accessibility APK

            Version code: ${{ steps.version.outputs.version_code }}
            Version name: ${{ steps.version.outputs.version_name }}
          files: release/app-debug.apk
          make_latest: true
